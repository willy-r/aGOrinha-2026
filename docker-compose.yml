services:
  app1:
    image: willrodrigues/gorinha-2026:latest
    networks:
      - backend
    environment:
      - GOGC=400
      - GOMEMLIMIT=150MiB
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O-", "http://127.0.0.1:9999/ready" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  app2:
    image: willrodrigues/gorinha-2026:latest
    networks:
      - backend
    environment:
      - GOGC=400
      - GOMEMLIMIT=150MiB
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O-", "http://127.0.0.1:9999/ready" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

networks:
  backend:
    driver: bridge
